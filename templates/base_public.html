<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page_title or "Humble Capital" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080d14">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v=6">
</head>
<body class="theme-dark public-body">
  <div class="public-bg">
    <div class="public-bg-glow public-bg-glow-a"></div>
    <div class="public-bg-glow public-bg-glow-b"></div>
    <div class="public-bg-glow public-bg-glow-c"></div>

    <div class="public-orb public-orb-a"></div>
    <div class="public-orb public-orb-b"></div>

    <div class="public-coin public-coin-1">₿</div>
    <div class="public-coin public-coin-2">₿</div>
    <div class="public-coin public-coin-3">Ξ</div>
    <div class="public-coin public-coin-4">₿</div>

    <div class="public-grid-lines"></div>
    <div class="public-noise"></div>
  </div>

  <div class="public-site">
    <header class="public-topbar">
      <a class="public-brand" href="/">
        <span class="public-brand-mark" style="background:linear-gradient(135deg,#2dd4bf,#60a5fa);color:#080d14;font-weight:800;font-size:14px;letter-spacing:-0.03em;display:inline-grid;place-items:center;width:36px;height:36px;border-radius:10px;">HC</span>
        <span class="public-brand-copy">
          <span class="public-brand-title">Humble Capital</span>
          <span class="public-brand-subtitle">Trading Console</span>
        </span>
      </a>

      <nav class="public-nav">
        <a class="public-nav-link" href="/">Home</a>
        <a class="public-nav-link" href="/explore">Explore</a>
        <a class="public-nav-link public-nav-cta" href="/login">Login</a>
      </nav>
    </header>

    <main class="public-shell">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
