<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page_title or "Leprechaun" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07110c">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v=4">
</head>
<body class="theme-dark public-body">
  <div class="public-bg">
    <div class="public-bg-glow public-bg-glow-a"></div>
    <div class="public-bg-glow public-bg-glow-b"></div>
    <div class="public-bg-glow public-bg-glow-c"></div>

    <div class="public-orb public-orb-a"></div>
    <div class="public-orb public-orb-b"></div>

    <div class="public-coin public-coin-1">₿</div>
    <div class="public-coin public-coin-2">₿</div>
    <div class="public-coin public-coin-3">☘</div>
    <div class="public-coin public-coin-4">₿</div>

    <div class="public-grid-lines"></div>
    <div class="public-noise"></div>
  </div>

  <div class="public-site">
    <header class="public-topbar">
      <a class="public-brand" href="/">
        <span class="public-brand-mark">☘</span>
        <span class="public-brand-copy">
          <span class="public-brand-title">Leprechaun</span>
          <span class="public-brand-subtitle">Automated Crypto Platform</span>
        </span>
      </a>

      <nav class="public-nav">
        <a class="public-nav-link" href="/">Home</a>
        <a class="public-nav-link" href="/login">Login</a>
      </nav>
    </header>

    <main class="public-shell">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
